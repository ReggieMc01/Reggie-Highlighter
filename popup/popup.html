<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reggie Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🌐 Reggie Translator</h1>
      <p class="subtitle">Translate any selected word using AI</p>
    </header>

    <div class="section">
      <label for="api-key-input">OpenRouter API Key</label>
      <div class="input-row">
        <input type="password" id="api-key-input" placeholder="sk-or-v1-..." autocomplete="off">
        <button id="toggle-key-btn" class="btn btn-small">Show</button>
      </div>
      <p class="hint">Your key is stored locally and never sent anywhere except OpenRouter. <a href="https://openrouter.ai/keys" target="_blank" style="color:#00d4ff;text-decoration:underline;">Get your API key</a></p>
    </div>

    <div class="section">
      <label for="language-select">Target Language</label>
      <select id="language-select">
        <option value="Spanish">Spanish</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="Chinese Simplified">Chinese Simplified</option>
        <option value="Arabic">Arabic</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Italian">Italian</option>
        <option value="Russian">Russian</option>
        <option value="Hindi">Hindi</option>
      </select>
    </div>

    <div class="section">
      <label for="word-input">Word to Translate</label>
      <textarea id="word-input" rows="2" style="width:100%;font-size:16px;padding:10px;border-radius:8px;resize:none;" placeholder="Double-click a word or type here..."></textarea>
      <button id="translate-btn" class="btn btn-primary" style="margin-top:10px;">Translate</button>
    </div>

    <div class="section">
      <label for="result">Translation</label>
      <textarea id="result" rows="2" readonly style="width:100%;font-size:16px;padding:10px;border-radius:8px;background:#222;color:#00d4ff;resize:none;" placeholder="Translation will appear here..."></textarea>
      <button id="copy-btn" class="btn btn-small" style="margin-top:8px;" disabled>Copy</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
